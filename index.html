<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <style>
        /* 基础设置 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Arial', sans-serif; line-height: 1.6; color: #333; background: #f5f5f5; }

        /* 页面整体样式 */
        header {
            background: linear-gradient(135deg, #4a90e2, #007aff);
            color: #fff;
            text-align: center;
            padding: 60px 20px;
        }
        header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            font-weight: bold;
        }
        header p {
            font-size: 1.2rem;
            margin-top: 5px;
        }
        .container {
            width: 90%;
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        /* 动画效果 */
        .section-title {
            text-align: center;
            font-size: 2rem;
            color: #4a90e2;
            margin-bottom: 20px;
            animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 关于我样式 */
        .about {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        .about img {
            border-radius: 50%;
            width: 120px;
            height: 120px;
            border: 5px solid #4a90e2;
            transition: transform 0.3s ease;
        }
        .about img:hover {
            transform: scale(1.1);
        }
        .about p {
            font-size: 1.1rem;
        }

        /* 博客文章 */
        .blog-posts .post {
            background: #fff;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            transition: transform 0.3s ease;
        }
        .blog-posts .post:hover {
            transform: scale(1.05);
        }
        .blog-posts .post h3 {
            color: #007aff;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        /* 项目展示 */
        .projects .project {
            background: #fff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
        }
        .projects .project h3 {
            color: #007aff;
            margin-bottom: 10px;
        }
        .projects .project a {
            color: #4a90e2;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }
        .projects .project a:hover {
            color: #007aff;
        }

        /* 技能展示 */
        .skills ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .skills ul li {
            background: #007aff;
            color: #fff;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        /* 联系方式 */
        .contact {
            text-align: center;
            margin-top: 30px;
        }
        .contact a {
            color: #4a90e2;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }
        .contact a:hover {
            color: #007aff;
        }
        .social-links a {
            margin: 0 10px;
            font-size: 1.2rem;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .about {
                flex-direction: column;
                text-align: center;
            }
            .about img {
                width: 100px;
                height: 100px;
            }
            .skills ul {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
